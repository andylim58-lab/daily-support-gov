
<!DOCTYPE html>
<html>
<head><meta charset='utf-8'><style>
    body{font-family:sans-serif; padding:20px; background:#f5f6f7;}

</style></head>
<body>
    <div class='box'>
        <h2>🔍 중기부 맞춤형 수집 결과</h2>
        <table>
            <thead><tr><th>번호</th><th>사업명</th><th>기관</th><th>공고일</th><th>링크</th></tr></thead>
            <tbody><tr><td colspan='5'>데이터가 없습니다.</td></tr></tbody>
        </table>
    </div>
</body>
</html>
